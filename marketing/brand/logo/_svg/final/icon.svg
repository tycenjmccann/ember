<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4c463f"/>
      <stop offset="55%" stop-color="#312c28"/>
      <stop offset="100%" stop-color="#201c19"/>
    </linearGradient>
    <linearGradient id="logFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2421"/>
      <stop offset="100%" stop-color="#140f0d"/>
    </linearGradient>
    <!-- hot coal: bright center → deep red rim -->
    <radialGradient id="coalA" cx="50%" cy="40%" r="62%">
      <stop offset="0%" stop-color="#fff0cf"/>
      <stop offset="26%" stop-color="#ffc15a"/>
      <stop offset="52%" stop-color="#ff7a1a"/>
      <stop offset="78%" stop-color="#ff3300"/>
      <stop offset="100%" stop-color="#7a1c00"/>
    </radialGradient>
    <radialGradient id="coalB" cx="50%" cy="40%" r="62%">
      <stop offset="0%" stop-color="#ffe6a8"/>
      <stop offset="34%" stop-color="#ff9a3a"/>
      <stop offset="66%" stop-color="#ff4d00"/>
      <stop offset="100%" stop-color="#6e1900"/>
    </radialGradient>
    <radialGradient id="bed" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#ff8a2a" stop-opacity="0.9"/>
      <stop offset="45%" stop-color="#ff4d00" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#ff4d00" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="logEnd" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffb24d"/>
      <stop offset="55%" stop-color="#ff5a00"/>
      <stop offset="100%" stop-color="#8f2000"/>
    </radialGradient>
  </defs>

  <!-- ground glow from the ember bed -->
  <ellipse cx="130" cy="196" rx="116" ry="28" fill="url(#bed)"/>

  <!-- THICK charred log resting behind the coal bed, slight 3/4 -->
  <path d="M52 86 L190 72 Q214 70 218 90 L220 98 Q222 114 198 117 L60 130 Q46 131 44 113 L42 100 Q41 88 52 86 Z" fill="url(#logTop)"/>
  <path d="M44 113 Q46 131 60 130 L198 117 Q222 114 222 134 L222 146 Q222 165 200 167 L62 170 Q46 171 44 153 Z" fill="url(#logFace)"/>
  <!-- glowing burnt end (left) -->
  <ellipse cx="46" cy="134" rx="13" ry="24" fill="#19120e"/>
  <ellipse cx="46" cy="134" rx="8.5" ry="17" fill="url(#logEnd)"/>
  <ellipse cx="46" cy="131" rx="3.5" ry="7" fill="#fff0cf" opacity="0.8"/>

  <!-- BED OF EMBERS: packed coal lumps, dark cracks BETWEEN them (toasting bed) -->
  <g>
    <ellipse cx="92"  cy="172" rx="26" ry="20" fill="url(#coalA)"/>
    <ellipse cx="138" cy="176" rx="30" ry="22" fill="url(#coalB)"/>
    <ellipse cx="182" cy="170" rx="24" ry="18" fill="url(#coalA)"/>
    <ellipse cx="114" cy="160" rx="20" ry="15" fill="url(#coalB)"/>
    <ellipse cx="160" cy="158" rx="19" ry="14" fill="url(#coalA)"/>
    <ellipse cx="70"  cy="162" rx="16" ry="12" fill="url(#coalB)"/>
  </g>
  <!-- bright hot specks on the nearest coals (catching air) -->
  <circle cx="138" cy="170" r="5" fill="#fff0cf" opacity="0.85"/>
  <circle cx="92" cy="166" r="3.5" fill="#ffe6a8" opacity="0.8"/>
  <circle cx="182" cy="166" r="3" fill="#ffe6a8" opacity="0.75"/>
</svg>
